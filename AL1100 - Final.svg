      <stop offset="0.5" stop-color="#8f8f8f"/>
      <stop offset="0.8" stop-color="#c7c7c7"/>
      <stop offset="1"   stop-color="#6a6a6a"/>
    </radialGradient>
    <!-- Inserts -->
