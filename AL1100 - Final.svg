<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg width="800" height="1290" viewBox="0 0 800 1290" version="1.1"
     xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Corps orange -->
    <linearGradient id="bodyGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0"    stop-color="#d96b12"/>
      <stop offset="0.12" stop-color="#f07b1a"/>
      <stop offset="0.5"  stop-color="#f4831e"/>
      <stop offset="0.88" stop-color="#f07b1a"/>
      <stop offset="1"    stop-color="#d15f0c"/>
    </linearGradient>
    <linearGradient id="bodyEdge" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0"   stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="0.1" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="0.9" stop-color="#000000" stop-opacity="0"/>
      <stop offset="1"   stop-color="#000000" stop-opacity="0.25"/>
    </linearGradient>

    <!-- Embouts de fixation -->
    <radialGradient id="mountGrad" cx="0.5" cy="0.35" r="0.8">
      <stop offset="0"   stop-color="#5a5a5c"/>
      <stop offset="0.6" stop-color="#3a3a3c"/>
      <stop offset="1"   stop-color="#1c1c1e"/>
    </radialGradient>
    <radialGradient id="screwHole" cx="0.4" cy="0.35" r="0.8">
      <stop offset="0"   stop-color="#cfcfcf"/>
      <stop offset="0.5" stop-color="#8a8a8a"/>
      <stop offset="1"   stop-color="#4a4a4a"/>
    </radialGradient>

    <!-- LED -->
