      <stop offset="0"   stop-color="#eaeaea"/>
      <stop offset="0.6" stop-color="#b8b8b8"/>
      <stop offset="1"   stop-color="#8a8a8a"/>
    </radialGradient>

    <!-- Bagues métal des connecteurs -->
    <radialGradient id="metalRing" cx="0.35" cy="0.3" r="0.85">
      <stop offset="0"    stop-color="#f2f2f2"/>
      <stop offset="0.45" stop-color="#c2c2c2"/>
      <stop offset="0.75" stop-color="#8f8f8f"/>
      <stop offset="1"    stop-color="#5c5c5c"/>
    </radialGradient>
    <!-- Fond du logement -->
    <radialGradient id="socket" cx="0.4" cy="0.35" r="0.9">
