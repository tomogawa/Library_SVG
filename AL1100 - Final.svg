      <stop offset="0"   stop-color="#ffb56b"/>
      <stop offset="0.5" stop-color="#f08a24"/>
      <stop offset="1"   stop-color="#c05f0c"/>
    </radialGradient>
    <radialGradient id="insertBlack" cx="0.42" cy="0.35" r="0.85">
